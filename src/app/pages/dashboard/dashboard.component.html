<ion-content [fullscreen]="true" class="ion-no-padding">
  <ion-card *ngFor="let news of allNews"  (click)="navDetailNews(news.url)">

    <img src="{{ news.urlToImage }}" />
    <ion-card-header>
      <ion-card-title>{{ news.title }}</ion-card-title>
      <ion-card-subtitle>{{ news.description }}</ion-card-subtitle>
    </ion-card-header>

    <ion-card-content>
      {{ news.content }}  
    </ion-card-content>    
  </ion-card>
  <br>
  <br>
</ion-content>
